{% extends "base.html" %}

{% block content %}
<article>
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}<time datetime="{{ page.date }}">{{ page.date }}</time>{% endif %}
        {% if page.description %}<p class="description">{{ page.description }}</p>{% endif %}
    </header>
    {{ page.content | safe }}
</article>
{% endblock content %}
