{% extends "base.html" %}

{% block content %}
<div class="not-found">
    <h1>{{ site.not_found.title }}</h1>
    <p>{{ site.not_found.message }}</p>
    <a href="/" class="go-home">{{ site.not_found.home_text }}</a>
    {% if site.not_found.image %}<img src="{{ site.not_found.image }}" alt="" class="not-found-img">{% endif %}
</div>
{% endblock content %}
