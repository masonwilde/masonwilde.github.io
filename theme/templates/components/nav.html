    <header class="site-header">
        <nav>
            <a href="/" class="site-title">{{ site.title }}</a>
            <ul class="nav-links">
                {% for item in site.nav %}
                <li><a href="{{ item.url | safe }}"{% if active_nav and active_nav == item.url %} class="active"{% endif %}>{{ item.name }}</a></li>
                {% endfor %}
            </ul>
            <button id="hamburger" class="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <button id="search-toggle" aria-label="Search" title="Search (/)">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </nav>
    </header>
    <div id="search-overlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="Site search">
        <div class="search-container">
            <input type="text" id="search-input" role="combobox" aria-expanded="false" aria-controls="search-results" aria-autocomplete="list" placeholder="Search... (category:recipes, OR, AND)" autocomplete="off">
        </div>
        <div id="search-results" class="search-results" role="listbox"></div>
    </div>
